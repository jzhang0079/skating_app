<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="48%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#162d5a"/>
      <stop offset="100%" stop-color="#060d1f"/>
    </radialGradient>
    <radialGradient id="iceGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8e4ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7bc8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="figureglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="236" fill="none" stroke="rgba(123,200,255,0.1)" stroke-width="1.5"/>

  <!-- Ice rink glow at base -->
  <ellipse cx="218" cy="420" rx="130" ry="18" fill="url(#iceGlow)" filter="url(#softglow)"/>

  <!-- Ice sparkle — top left -->
  <g filter="url(#softglow)" opacity="0.65">
    <line x1="82" y1="100" x2="82" y2="122" stroke="#b8e4ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="71"  y1="111" x2="93"  y2="111" stroke="#b8e4ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="74"  y1="103" x2="90"  y2="119" stroke="#b8e4ff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="90"  y1="103" x2="74"  y2="119" stroke="#b8e4ff" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Ice sparkle — top right (smaller) -->
  <g filter="url(#softglow)" opacity="0.45">
    <line x1="402" y1="82" x2="402" y2="98"  stroke="#7bc8ff" stroke-width="2"   stroke-linecap="round"/>
    <line x1="394" y1="90" x2="410" y2="90"  stroke="#7bc8ff" stroke-width="2"   stroke-linecap="round"/>
    <line x1="396" y1="84" x2="408" y2="96"  stroke="#7bc8ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="408" y1="84" x2="396" y2="96"  stroke="#7bc8ff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Tiny sparkle dots -->
  <circle cx="390" cy="355" r="2.5" fill="#b8e4ff" opacity="0.4" filter="url(#softglow)"/>
  <circle cx="110" cy="340" r="2"   fill="#7bc8ff" opacity="0.35" filter="url(#softglow)"/>
  <circle cx="420" cy="200" r="2"   fill="#b8e4ff" opacity="0.3"/>

  <!-- ===== SKATER SILHOUETTE (arabesque/spiral pose, facing left) ===== -->
  <!--
    Key joints:
      Head:           (162, 136)
      Neck base:      (165, 163)
      Shoulder:       (163, 188)
      Hip:            (192, 272)
      Standing ankle: (208, 405)
      Free leg toe:   (342, 162)
      Left arm hand:  ( 88, 166)
      Right arm hand: (262, 218)
  -->

  <g filter="url(#figureglow)">

    <!-- ── Free leg (arabesque, back-right, going UP) rendered first so torso overlaps it ── -->
    <!-- Upper free leg: hip → knee -->
    <path d="M 192 272 Q 252 254 296 234"
          fill="none" stroke="white" stroke-width="25" stroke-linecap="round"/>
    <!-- Lower free leg: knee → toe -->
    <path d="M 296 234 Q 322 210 342 162"
          fill="none" stroke="white" stroke-width="20" stroke-linecap="round"/>

    <!-- ── Back arm (right arm of skater, extends right) ── -->
    <path d="M 172 195 Q 218 208 262 218"
          fill="none" stroke="white" stroke-width="15" stroke-linecap="round"/>

    <!-- ── Torso: shoulder → hip (leans forward) ── -->
    <path d="M 163 188 Q 174 228 192 272"
          fill="none" stroke="white" stroke-width="34" stroke-linecap="round"/>

    <!-- ── Standing leg: hip → knee → ankle ── -->
    <!-- Upper (thigh) -->
    <path d="M 192 272 Q 198 330 205 372"
          fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <!-- Lower (calf) -->
    <path d="M 205 372 Q 207 390 208 405"
          fill="none" stroke="white" stroke-width="19" stroke-linecap="round"/>

    <!-- ── Forward arm (left arm of skater, extends left) ── -->
    <path d="M 152 194 Q 122 182  88 166"
          fill="none" stroke="white" stroke-width="15" stroke-linecap="round"/>

    <!-- ── Head ── -->
    <circle cx="162" cy="136" r="27" fill="white"/>

    <!-- ── Ponytail flowing back-right ── -->
    <path d="M 178 124 Q 215 104 248 116 Q 265 122 258 134"
          fill="none" stroke="white" stroke-width="9" stroke-linecap="round"/>

  </g>

  <!-- ── Skate blade at ankle ── -->
  <!-- Mount -->
  <rect x="172" y="405" width="72" height="7" rx="3" fill="rgba(180,220,255,0.7)"/>
  <!-- Blade — slightly longer than the mount, glowing -->
  <path d="M 148 414 Q 165 409 178 409 L 252 409 Q 270 409 280 413 Q 284 416 280 418 Q 268 420 252 418 L 178 418 Q 162 418 148 418 Q 140 416 148 414 Z"
        fill="#c8eaff" filter="url(#glow)"/>
  <!-- Blade shine -->
  <line x1="155" y1="414" x2="277" y2="414" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>

</svg>
