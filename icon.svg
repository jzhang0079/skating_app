<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#060d1f"/>
    </radialGradient>
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8e4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7bc8ff" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="rgba(123,200,255,0.12)" stroke-width="1.5"/>

  <!-- Ice sparkle top-left -->
  <g filter="url(#softglow)" opacity="0.7">
    <line x1="92" y1="108" x2="92" y2="128" stroke="#b8e4ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="82" y1="118" x2="102" y2="118" stroke="#b8e4ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="85" y1="111" x2="99" y2="125" stroke="#b8e4ff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="99" y1="111" x2="85" y2="125" stroke="#b8e4ff" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Ice sparkle top-right -->
  <g filter="url(#softglow)" opacity="0.55">
    <line x1="400" y1="90" x2="400" y2="106" stroke="#7bc8ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="392" y1="98" x2="408" y2="98" stroke="#7bc8ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="394.5" y1="92.5" x2="405.5" y2="103.5" stroke="#7bc8ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="405.5" y1="92.5" x2="394.5" y2="103.5" stroke="#7bc8ff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Small sparkle dot bottom-right -->
  <circle cx="390" cy="370" r="3" fill="#b8e4ff" opacity="0.5" filter="url(#softglow)"/>
  <circle cx="130" cy="350" r="2" fill="#7bc8ff" opacity="0.4" filter="url(#softglow)"/>

  <!-- ===== ICE SKATE BOOT ===== -->
  <!-- Boot shaft (tall part) -->
  <path d="
    M 188 160
    L 188 292
    Q 188 308 204 312
    L 308 312
    Q 322 312 324 298
    L 328 228
    Q 330 212 316 206
    L 268 192
    L 252 160
    Z
  " fill="#dff0ff" filter="url(#glow)"/>

  <!-- Boot shaft highlight -->
  <path d="
    M 200 165
    L 200 290
    Q 200 300 210 302
    L 260 302
    L 260 175
    Z
  " fill="rgba(255,255,255,0.18)"/>

  <!-- Boot toe box (front rounded part) -->
  <path d="
    M 188 292
    Q 186 320 192 336
    Q 198 350 224 354
    L 310 354
    Q 326 354 332 342
    Q 338 330 336 312
    L 308 312
    Q 322 312 324 298
    L 204 312
    Q 188 308 188 292
    Z
  " fill="#c8e6ff"/>

  <!-- Toe box highlight -->
  <path d="M 196 296 Q 194 322 200 338 Q 202 344 212 347 L 240 347 Q 198 340 196 296 Z"
        fill="rgba(255,255,255,0.15)"/>

  <!-- Boot laces area (darker inset) -->
  <rect x="210" y="170" width="54" height="110" rx="8"
        fill="rgba(10,40,100,0.25)"/>

  <!-- Laces -->
  <g stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" opacity="0.85">
    <line x1="215" y1="183" x2="258" y2="183"/>
    <line x1="215" y1="198" x2="258" y2="198"/>
    <line x1="215" y1="213" x2="258" y2="213"/>
    <line x1="215" y1="228" x2="258" y2="228"/>
    <line x1="215" y1="243" x2="258" y2="243"/>
    <line x1="215" y1="258" x2="258" y2="258"/>
    <!-- Lace cross lines -->
    <line x1="215" y1="183" x2="215" y2="268" stroke-width="1.5" opacity="0.4"/>
    <line x1="258" y1="183" x2="258" y2="268" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Boot sole (dark bottom edge) -->
  <path d="M 188 340 Q 188 360 210 362 L 318 362 Q 340 362 340 342 L 336 328 Q 336 354 318 354 L 210 354 Q 192 354 190 338 Z"
        fill="rgba(8,20,55,0.7)"/>

  <!-- ===== BLADE ===== -->
  <!-- Blade mount -->
  <rect x="198" y="355" width="142" height="10" rx="4" fill="#8ab8d8"/>

  <!-- Blade body -->
  <path d="M 150 368 Q 170 362 200 362 L 340 362 Q 365 362 375 368 Q 380 372 375 374 Q 365 376 340 374 L 200 374 Q 170 374 150 374 Q 140 372 150 368 Z"
        fill="url(#bladeGlow)" filter="url(#glow)"/>

  <!-- Blade front curve (toe pick area) -->
  <path d="M 340 362 Q 368 360 378 366 Q 385 370 380 374 Q 372 377 340 374 Z"
        fill="#e8f6ff" opacity="0.9"/>

  <!-- Blade shine line -->
  <line x1="160" y1="369" x2="372" y2="369" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Blade ice reflection glow beneath -->
  <ellipse cx="262" cy="382" rx="110" ry="6" fill="#7bc8ff" opacity="0.18" filter="url(#softglow)"/>

  <!-- "A" monogram on boot -->
  <text x="294" y="286" font-family="Georgia, serif" font-size="44" font-weight="bold"
        fill="rgba(10,40,100,0.35)" text-anchor="middle">A</text>
</svg>
